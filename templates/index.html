<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minerland</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>

<body>
    <main class="game-main-container">
        <div class="money-status-bar">
            <span class="money-currency-icon">$</span>
            <span id="money-display">
                {{ state.cash }}
            </span>
        </div>

        <div class="right-floating-menu">
            <div class="circular-menu-trigger">
                <div class="hamburger-menu-lines"></div>
            </div>
        </div>

        <div class="game-screen-wrapper">
            <div class="left-wheel-menu-wrapper">
                <svg class="wheel-menu-svg" viewBox="-160 -160 320 320" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <clipPath id="half-clip">
                            <rect x="0" y="-160" width="160" height="320" />
                        </clipPath>
                    </defs>

                    <g id="wg"
                        style="transform: rotate(-45deg); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);">

                        <!-- 0: Mine -->
                        <!-- hx-target points to your center area, hx-swap replaces the content -->
                        <g class="sg wheel-menu-segment active" data-i="0" onclick="sel(0)" hx-get="/switch_menu/mine"
                            hx-target=".center-mining-area" hx-swap="innerHTML">
                            <path class="segment-background-shape" transform="rotate(-45)"
                                d="M0,0 L140,0 A140,140 0 0,1 0,140 Z" />
                            <path class="segment-border-stroke" transform="rotate(-45)"
                                d="M0,0 L140,0 A140,140 0 0,1 0,140 Z" />
                            <g class="segment-icon-content" transform="translate(70, 25)">
                                <text text-anchor="middle" font-size="11" font-weight="600" letter-spacing="0.08em"
                                    class="segment-title-text">MINE</text>
                            </g>
                        </g>

                        <!-- 1: Stats -->
                        <g class="sg wheel-menu-segment" data-i="1" onclick="sel(1)" hx-get="/switch_menu/stats"
                            hx-target=".center-mining-area" hx-swap="innerHTML">
                            <path class="segment-background-shape" transform="rotate(45)"
                                d="M0,0 L140,0 A140,140 0 0,1 0,140 Z" />
                            <path class="segment-border-stroke" transform="rotate(45)"
                                d="M0,0 L140,0 A140,140 0 0,1 0,140 Z" />
                            <g class="segment-icon-content" transform="translate(-25, 70)">
                                <text text-anchor="middle" font-size="11" font-weight="600" letter-spacing="0.08em"
                                    transform="rotate(-90)" class="segment-title-text">STATS</text>
                            </g>
                        </g>

                        <!-- 2: Workers -->
                        <g class="sg wheel-menu-segment" data-i="2" onclick="sel(2)" hx-get="/switch_menu/workers"
                            hx-target=".center-mining-area" hx-swap="innerHTML">
                            <path class="segment-background-shape" transform="rotate(135)"
                                d="M0,0 L140,0 A140,140 0 0,1 0,140 Z" />
                            <path class="segment-border-stroke" transform="rotate(135)"
                                d="M0,0 L140,0 A140,140 0 0,1 0,140 Z" />
                            <g class="segment-icon-content" transform="translate(-70, -25)">
                                <text text-anchor="middle" font-size="11" font-weight="600" letter-spacing="0.08em"
                                    transform="rotate(-180)" class="segment-title-text">WORKER</text>
                            </g>
                        </g>

                        <!-- 3: Shop -->
                        <g class="sg wheel-menu-segment" data-i="3" onclick="sel(3)" hx-get="/switch_menu/shop"
                            hx-target=".center-mining-area" hx-swap="innerHTML">
                            <path class="segment-background-shape" transform="rotate(225)"
                                d="M0,0 L140,0 A140,140 0 0,1 0,140 Z" />
                            <path class="segment-border-stroke" transform="rotate(225)"
                                d="M0,0 L140,0 A140,140 0 0,1 0,140 Z" />
                            <g class="segment-icon-content" transform="translate(25, -70)">
                                <text text-anchor="middle" font-size="11" font-weight="600" letter-spacing="0.08em"
                                    transform="rotate(90)" class="segment-title-text">SHOP</text>
                            </g>
                        </g>
                    </g>

                    <circle cx="0" cy="0" r="28" class="wheel-center-disk-outer" />
                    <circle cx="0" cy="0" r="15" class="wheel-center-disk-inner" />
                    <circle cx="0" cy="0" r="5" class="wheel-center-dot" />

                    <g id="indicator" transform="translate(152, 0)">
                        <polygon points="0,-9 14,0 0,9" class="wheel-indicator-arrow" />
                    </g>
                </svg>
            </div>

            <div class="center-mining-area">

                <div id="panel-0" class="content-panel">
                    <h2 id="ore-name" class="ore-display-name">{{ state.ore_name }}</h2>
                    <div class="ore-click-zone" hx-post="/mine" hx-swap="none">
                        <img id="ore-image" src="{{ url_for('static', filename=state.ore_image) }}" alt="Ore"
                            class="ore-pixel-art-image">
                    </div>
                    <div class="health-bar-track">
                        <div id="health-progress" hx-get="/health" hx-trigger="load" hx-swap="outerHTML">
                            {{health_percent}}</div>
                    </div>
                </div>

                <div id="panel-1" class="content-panel hidden">
                    <h2 class="ore-display-name">STATS</h2>
                    <div class="stats-container">
                        <div class="stat-item"><span class="stat-label">Total Ores</span> <span
                                class="stat-value">1,204</span></div>
                        <div class="stat-item"><span class="stat-label">Clicks/sec</span> <span
                                class="stat-value">4.5</span></div>
                        <div class="stat-item"><span class="stat-label">Playtime</span> <span class="stat-value">2h
                                15m</span></div>
                    </div>
                </div>

                <div id="panel-2" class="content-panel hidden">
                    <h2 class="ore-display-name" id="worker-name">MINER BOB</h2>

                    <div class="worker-nav-wrapper">
                        <button class="nav-arrow" onclick="changeWorker(-1)">&#10094;</button>

                        <div class="worker-visual">
                            <svg class="worker-svg" viewBox="0 0 24 24" fill="none" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </div>

                        <button class="nav-arrow" onclick="changeWorker(1)">&#10095;</button>
                    </div>

                    <div class="worker-stats" id="worker-stats">Power: 2 dmg/s | Cost: $50</div>
                    <button class="buy-btn">HIRE WORKER</button>
                </div>

            </div>

        </div>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
